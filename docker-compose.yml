services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.le.acme.email=louismollick@gmail.com
      - --certificatesresolvers.le.acme.storage=/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --api.dashboard=false
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - traefik-public
    labels:
      - com.centurylinklabs.watchtower.enable=true

  anki-desktop:
    image: ghcr.io/louismollick/anki-desktop-docker:main
    restart: unless-stopped
    env_file:
      - .env-anki
    volumes:
      - ./volumes/anki_data:/config
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - "traefik.http.routers.anki-ui.rule=Host(`anki.louismollick.com`)"
      - traefik.http.routers.anki-ui.entrypoints=websecure
      - traefik.http.routers.anki-ui.tls=true
      - traefik.http.routers.anki-ui.tls.certresolver=le
      - traefik.http.routers.anki-ui.service=anki-ui
      - traefik.http.routers.anki-ui.priority=10
      - traefik.http.services.anki-ui.loadbalancer.server.port=3000
      - "traefik.http.routers.anki-api.rule=Host(`anki.louismollick.com`) && PathPrefix(`/api`)"
      - traefik.http.routers.anki-api.entrypoints=websecure
      - traefik.http.routers.anki-api.tls=true
      - traefik.http.routers.anki-api.tls.certresolver=le
      - traefik.http.routers.anki-api.service=anki-api
      - traefik.http.routers.anki-api.priority=100
      - traefik.http.routers.anki-api.middlewares=anki-api-strip
      - traefik.http.services.anki-api.loadbalancer.server.port=8765
      - traefik.http.middlewares.anki-api-strip.stripprefix.prefixes=/api
      - com.centurylinklabs.watchtower.enable=true

  spotify-lyrics-api:
    image: ghcr.io/louismollick/spotify-lyrics-api:main
    restart: unless-stopped
    env_file:
      - .env-lyrics
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - "traefik.http.routers.lyrics-api.rule=Host(`spotify-lyrics-api.louismollick.com`)"
      - traefik.http.routers.lyrics-api.entrypoints=websecure
      - traefik.http.routers.lyrics-api.tls=true
      - traefik.http.routers.lyrics-api.tls.certresolver=le
      - traefik.http.routers.lyrics-api.service=lyrics-api
      - traefik.http.services.lyrics-api.loadbalancer.server.port=8080
      - com.centurylinklabs.watchtower.enable=true

  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    env_file:
      - .env-navidrome
    environment:
      ND_DATAFOLDER: /data
      ND_MUSICFOLDER: /music
    volumes:
      - ./volumes/navidrome_data:/data
      - ./music:/music:ro
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - "traefik.http.routers.navidrome.rule=Host(`music.louismollick.com`)"
      - traefik.http.routers.navidrome.entrypoints=websecure
      - traefik.http.routers.navidrome.tls=true
      - traefik.http.routers.navidrome.tls.certresolver=le
      - traefik.http.services.navidrome.loadbalancer.server.port=4533
      - com.centurylinklabs.watchtower.enable=true

  actual-server:
    image: docker.io/actualbudget/actual-server:26.3.0@sha256:eb8bc26f53025e07e464594c12d77c52c4b95840c8dadd9b95c4f0c4660f8ad2
    restart: unless-stopped
    volumes:
      - ./volumes/actual_data:/data
    networks:
      - traefik-public
      - actual-internal
    labels:
      - traefik.enable=true
      - "traefik.http.routers.actual-server.rule=Host(`budget.louismollick.com`)"
      - traefik.http.routers.actual-server.entrypoints=websecure
      - traefik.http.routers.actual-server.tls=true
      - traefik.http.routers.actual-server.tls.certresolver=le
      - traefik.http.services.actual-server.loadbalancer.server.port=5006
      - com.centurylinklabs.watchtower.enable=true

  actual-ai:
    image: docker.io/sakowicz/actual-ai:2.3.0@sha256:f3ba0b94dccee8f52ff77f417dc0c9f6f9a3dfce145dd05e9cf99f9cc07397de
    restart: unless-stopped
    depends_on:
      - actual-server
    env_file:
      - .env-actual-ai
    networks:
      - actual-internal

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --interval
      - "300"
      - --cleanup
      - --rolling-restart
      - --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  traefik-public:
    name: traefik-public
  actual-internal:
    internal: true
